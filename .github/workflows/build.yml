name: Build Windows EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build EXE（使用 .spec，自动嵌入版本号）
        run: pyinstaller --noconfirm AudioFileManager.spec

      - name: 从 CHANGELOG 提取版本说明
        run: python scripts/generate_release_body.py

      - name: Upload EXE & 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          files: dist/AudioFileManager.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
