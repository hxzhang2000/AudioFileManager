name: Build Windows EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build single-file EXE
        run: pyinstaller --noconfirm --onefile --windowed --name AudioFileManager --add-data "ui/dark_theme.qss;ui" --add-data "config/default_config.json;config" main.py

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AudioFileManager.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
